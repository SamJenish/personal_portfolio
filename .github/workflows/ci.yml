name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'next/package-lock.json'

    - name: Install Dependencies
      working-directory: ./next
      run: npm ci

    - name: Run Linter
      working-directory: ./next
      run: npm run lint

    - name: Build Next.js App
      working-directory: ./next
      run: npm run build
